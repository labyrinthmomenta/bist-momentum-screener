name: BIST Günlük & Haftalık Güncelleme

on:
  schedule:
    # Her gün 18:45 Türkiye saati = 15:45 UTC (günlük kapanış verisi)
    - cron: '45 15 * * 1-5'
    # Her Cuma 21:30 Türkiye saati = 18:30 UTC (strateji listesi güncelleme)
    - cron: '30 18 * * 5'
  workflow_dispatch:
    inputs:
      force_strategy:
        description: 'Strateji listesini zorla güncelle'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repo çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: pip install yfinance openpyxl

      - name: Güncelle & Derle
        run: python run.py

      - name: Değişiklikleri kaydet
        run: |
          git config user.name  "Labyrinth Bot"
          git config user.email "bot@labyrinth.local"
          git add docs/ run.log
          git diff --staged --quiet || git commit -m "📊 Güncelleme: $(date +'%Y-%m-%d %H:%M') UTC"
          git push

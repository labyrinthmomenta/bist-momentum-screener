name: BIST Günlük Güncelleme

on:
  schedule:
    # Her gün 18:30 Türkiye saati = 15:30 UTC
    - cron: '30 15 * * 1-5'
  workflow_dispatch:   # Manuel tetikleme butonu

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repo çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: pip install yfinance openpyxl

      - name: Güncelle & Siteyi derle
        run: python run.py

      - name: Değişiklikleri kaydet
        run: |
          git config user.name  "Labyrinth Bot"
          git config user.email "bot@labyrinth.local"
          git add docs/ run.log
          git diff --staged --quiet || git commit -m "📊 Otomatik güncelleme: $(date +'%Y-%m-%d %H:%M')"
          git push

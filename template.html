<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labyrinth — BIST Momentum Screener</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080b0f;--bg2:#0d1117;--bg3:#131920;--bg4:#1a2230;
  --border:#1e2d3d;--border2:#243444;
  --text:#c9d8e8;--text2:#6b8099;--text3:#3a4f62;
  --accent:#38bdf8;--green:#22d3a0;--red:#f43f5e;
  --viop:#a78bfa;--viop2:#2d1f4e;
  --mono:'JetBrains Mono',monospace;--sans:'Space Grotesk',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;min-height:100vh;overflow-x:hidden}

/* HEADER */
.hdr{position:sticky;top:0;z-index:200;background:rgba(8,11,15,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px}
.logo{display:flex;align-items:center;gap:10px}
.logo-hex{width:26px;height:26px;background:linear-gradient(135deg,var(--accent),var(--viop));clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)}
.logo-txt{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.14em}
.logo-txt span{color:var(--accent)}
.hdr-right{display:flex;align-items:center;gap:20px}
.hdr-meta{font-family:var(--mono);font-size:10px;color:var(--text2)}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* STAT BAR */
.statbar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto}
.statbar::-webkit-scrollbar{display:none}
.stat{padding:11px 20px;border-right:1px solid var(--border);flex-shrink:0;min-width:105px}
.stat-val{font-family:var(--mono);font-size:20px;font-weight:600;line-height:1;margin-bottom:3px}
.stat-lbl{font-size:10px;color:var(--text2);letter-spacing:.04em}

/* LAYOUT */
.layout{display:grid;grid-template-columns:230px 1fr;min-height:calc(100vh - 52px - 48px)}

/* SIDEBAR */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:14px 12px;overflow-y:auto;overflow-x:hidden}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.slabel{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.18em;color:var(--text3);text-transform:uppercase;margin-bottom:7px;padding-left:2px}
.ssec{margin-bottom:18px}

.search-wrap{position:relative}
.search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.search-inp{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 8px 7px 28px;border-radius:5px;font-family:var(--mono);font-size:11px;outline:none;transition:border-color .15s}
.search-inp:focus{border-color:var(--accent)}
.search-inp::placeholder{color:var(--text3)}

.fbtn-group{display:flex;gap:5px;flex-wrap:wrap}
.fbtn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:5px 10px;border-radius:4px;font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.06em;cursor:pointer;transition:all .15s}
.fbtn:hover{border-color:var(--border2);color:var(--text)}
.fbtn.on{background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.35);color:var(--accent)}
.fbtn.on-v{background:var(--viop2);border-color:rgba(167,139,250,.4);color:var(--viop)}

.sbtn-group{display:flex;flex-direction:column;gap:4px}
.sbtn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:7px 10px;border-radius:4px;font-family:var(--mono);font-size:10px;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;transition:all .15s}
.sbtn:hover{border-color:var(--border2);color:var(--text)}
.sbtn.on{background:rgba(56,189,248,.07);border-color:rgba(56,189,248,.3);color:var(--accent)}

/* SEKTÖR — düzeltildi: normal font, satır kaydırma, görünür */
.ind-list{max-height:260px;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;gap:1px}
.ind-list::-webkit-scrollbar{width:3px}
.ind-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.ibtn{
  background:none;border:none;color:var(--text2);
  padding:5px 6px 5px 8px;border-radius:3px;
  font-family:var(--sans);font-size:11.5px;font-weight:400;
  cursor:pointer;text-align:left;transition:background .1s,color .1s;
  white-space:normal;line-height:1.35;width:100%;display:block;
  word-break:break-word;
}
.ibtn:hover{background:var(--bg3);color:var(--text)}
.ibtn.on{background:var(--bg3);color:var(--accent);border-left:2px solid var(--accent);padding-left:10px}

/* MAIN */
.main{display:flex;flex-direction:column;overflow:hidden}
.toolbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:9px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.view-tabs{display:flex;border:1px solid var(--border);border-radius:5px;overflow:hidden}
.vtab{background:var(--bg3);border:none;border-right:1px solid var(--border);color:var(--text2);padding:6px 13px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;cursor:pointer;transition:all .15s}
.vtab:last-child{border-right:none}
.vtab:hover{color:var(--text)}
.vtab.on{background:rgba(56,189,248,.1);color:var(--accent)}
.dl-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:5px;font-family:var(--mono);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.dl-btn:hover{border-color:var(--accent);color:var(--accent)}
.rcount{font-family:var(--mono);font-size:10px;color:var(--text3)}

/* TABLE */
.tbl-wrap{flex:1;overflow:auto}
.tbl-wrap::-webkit-scrollbar{width:5px;height:5px}
.tbl-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg2);position:sticky;top:0;z-index:10}
th{padding:9px 12px;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.12em;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;transition:color .15s}
th:hover{color:var(--text2)}
th.sorted{color:var(--accent)}
td{padding:8px 12px;border-bottom:1px solid rgba(30,45,61,.5);font-family:var(--mono);font-size:12px;white-space:nowrap}
tr:hover td{background:rgba(255,255,255,.018);cursor:pointer}
.tr-viop td:first-child{border-left:2px solid rgba(167,139,250,.45)}
.rank-c{font-size:10px;color:var(--text3);text-align:right;width:30px}
.badge{padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.08em}
.bv{background:var(--viop2);color:var(--viop);border:1px solid rgba(167,139,250,.3)}
.bs{background:rgba(34,211,160,.07);color:rgba(34,211,160,.55);border:1px solid rgba(34,211,160,.15)}
.ticker-c{font-weight:600;font-size:13px}
.name-c{font-family:var(--sans);font-size:11px;color:var(--text2);max-width:170px;overflow:hidden;text-overflow:ellipsis}
.ind-c{font-size:10px;color:var(--text3)}
.mom-wrap{display:flex;align-items:center;gap:7px}
.mom-bg{width:50px;height:3px;background:var(--bg4);border-radius:2px;position:relative;overflow:visible}
.mom-bar{height:3px;border-radius:2px;position:absolute}
.spark{display:flex;align-items:flex-end;gap:2px;height:18px}
.spark-b{width:5px;border-radius:1px}
.npf-cell{display:flex;align-items:center;gap:3px;font-size:11px}

/* HEAT MAP */
.hm-wrap{flex:1;overflow:auto;padding:16px 18px}
.hm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:4px}
.hm-cell{padding:9px 7px;border-radius:5px;cursor:pointer;transition:transform .12s,filter .12s;position:relative}
.hm-cell:hover{transform:scale(1.05);filter:brightness(1.25)}
.hm-t{font-family:var(--mono);font-size:11px;font-weight:600;color:rgba(255,255,255,.9);margin-bottom:3px}
.hm-v{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.6)}
.hm-dot{position:absolute;top:4px;right:4px;width:4px;height:4px;background:rgba(255,255,255,.5);border-radius:50%}

/* ── DETAY MODAL ────────────────────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;width:100%;max-width:860px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.7)}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.modal-hdr{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:10}
.modal-title{font-size:18px;font-weight:700;margin-bottom:3px}
.modal-sub{font-family:var(--mono);font-size:11px;color:var(--text2)}
.modal-close{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:30px;height:30px;border-radius:5px;cursor:pointer;font-size:14px;transition:all .15s;flex-shrink:0}
.modal-close:hover{border-color:var(--red);color:var(--red)}
.modal-body{padding:20px 22px}

/* Modal tabs */
.mtabs{display:flex;border:1px solid var(--border);border-radius:5px;overflow:hidden;margin-bottom:18px;width:fit-content}
.mtab{background:var(--bg3);border:none;border-right:1px solid var(--border);color:var(--text2);padding:7px 16px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;cursor:pointer;transition:all .15s}
.mtab:last-child{border-right:none}
.mtab.on{background:rgba(56,189,248,.1);color:var(--accent)}

/* Özet kartlar */
.m-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.m-card{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:13px 14px}
.m-card-val{font-family:var(--mono);font-size:18px;font-weight:600;line-height:1;margin-bottom:4px}
.m-card-lbl{font-size:10px;color:var(--text2);line-height:1.3}

/* Aylık grid */
.m-sec-title{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.16em;color:var(--text3);text-transform:uppercase;margin-bottom:10px;margin-top:4px}
.m-month-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:20px}
.m-month-card{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:11px 12px}
.mmcard-lbl{font-family:var(--mono);font-size:10px;color:var(--accent);margin-bottom:8px;font-weight:600}
.mmcard-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.mmcard-key{font-size:10px;color:var(--text3)}
.mmcard-val{font-family:var(--mono);font-size:11px;font-weight:500}

/* Neg/Pos/Flat bar chart */
.npf-bars{display:flex;gap:6px;margin-top:9px;padding-top:9px;border-top:1px solid var(--border)}
.npf-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.npf-bg{width:100%;height:32px;background:var(--bg4);border-radius:3px;display:flex;align-items:flex-end;overflow:hidden}
.npf-fill{width:100%;border-radius:3px 3px 0 0}
.npf-num{font-family:var(--mono);font-size:11px;font-weight:600}
.npf-lbl{font-family:var(--mono);font-size:9px;color:var(--text3)}

/* Günlük tablo */
.m-daily-wrap{overflow-x:auto;max-height:340px;overflow-y:auto;border:1px solid var(--border);border-radius:6px}
.m-daily-wrap::-webkit-scrollbar{width:3px}
.m-daily-wrap::-webkit-scrollbar-thumb{background:var(--border2)}
.m-daily-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px}
.m-daily-table th{padding:7px 12px;font-size:9px;letter-spacing:.1em;color:var(--text3);border-bottom:1px solid var(--border);text-align:left;background:var(--bg2);position:sticky;top:0}
.m-daily-table td{padding:6px 12px;border-bottom:1px solid rgba(30,45,61,.4)}
.m-daily-table tr:last-child td{border-bottom:none}
.m-daily-table tr:hover td{background:rgba(255,255,255,.02)}

.loading{text-align:center;padding:48px;color:var(--text3);font-family:var(--mono);font-size:11px}
.info-box{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:14px 16px;font-family:var(--mono);font-size:11px;color:var(--text2);line-height:1.7;margin-bottom:16px}
.info-box code{color:var(--accent);background:rgba(56,189,248,.08);padding:1px 5px;border-radius:3px}

/* TOOLTIP */
.tt{position:fixed;background:var(--bg2);border:1px solid var(--border2);border-radius:7px;padding:11px 14px;font-family:var(--mono);font-size:11px;z-index:300;pointer-events:none;opacity:0;transition:opacity .12s;max-width:225px;line-height:1.7;box-shadow:0 12px 32px rgba(0,0,0,.5)}
.tt.show{opacity:1}
.tt-title{font-weight:600;color:var(--accent);margin-bottom:6px;font-size:12px}
.tt-row{display:flex;justify-content:space-between;gap:16px}
.tt-k{color:var(--text2)}

@media(max-width:860px){.layout{grid-template-columns:1fr}.sidebar{display:none}.m-cards{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">
    <div class="logo-hex"></div>
    <span class="logo-txt">LABYRINTH <span>MOMENTUM</span></span>
  </div>
  <div class="hdr-right">
    <a href="strategies.html" style="font-family:var(--mono);font-size:10px;color:var(--text2);text-decoration:none;border:1px solid var(--border);padding:5px 12px;border-radius:4px;transition:all .15s" onmouseover="this.style.color='var(--accent)';this.style.borderColor='rgba(56,189,248,.3)'" onmouseout="this.style.color='var(--text2)';this.style.borderColor='var(--border)'">⚡ STRATEJİLER</a>
    <span class="hdr-meta"><span class="pulse"></span>Wesley R. Gray — Quantitative Momentum</span>
    <span class="hdr-meta" id="hdr-date">—</span>
  </div>
</header>

<div class="statbar">
  <div class="stat"><div class="stat-val" id="s-total">—</div><div class="stat-lbl">Toplam Hisse</div></div>
  <div class="stat"><div class="stat-val" style="color:var(--viop)" id="s-viop">—</div><div class="stat-lbl">VIOP</div></div>
  <div class="stat"><div class="stat-val" style="color:var(--green)" id="s-pmom">—</div><div class="stat-lbl">↑ Momentum</div></div>
  <div class="stat"><div class="stat-val" style="color:var(--red)" id="s-nmom">—</div><div class="stat-lbl">↓ Momentum</div></div>
  <div class="stat"><div class="stat-val" style="color:var(--green)" id="s-nfip">—</div><div class="stat-lbl">FIP Kaliteli (−)</div></div>
  <div class="stat"><div class="stat-val" style="color:var(--red)" id="s-pfip">—</div><div class="stat-lbl">FIP Düşük (+)</div></div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="ssec">
      <div class="slabel">Arama</div>
      <div class="search-wrap">
        <span class="search-ico">⌕</span>
        <input class="search-inp" id="q" type="text" placeholder="Ticker veya şirket...">
      </div>
    </div>
    <div class="ssec">
      <div class="slabel">İşlem Tipi</div>
      <div class="fbtn-group">
        <button class="fbtn on"  data-type="ALL"   onclick="setType('ALL',this)">Tümü</button>
        <button class="fbtn"     data-type="VIOP"  onclick="setType('VIOP',this)">VIOP</button>
        <button class="fbtn"     data-type="Stock" onclick="setType('Stock',this)">Hisse</button>
      </div>
    </div>
    <div class="ssec">
      <div class="slabel">Sıralama</div>
      <div class="sbtn-group">
        <button class="sbtn on" data-k="mom"   onclick="setSort('mom',this)">12-1M Momentum <span id="arr-mom">↓</span></button>
        <button class="sbtn"    data-k="fip"   onclick="setSort('fip',this)">Yıllık FIP <span id="arr-fip"></span></button>
        <button class="sbtn"    data-k="mom_m" onclick="setSort('mom_m',this)">Aylık Momentum <span id="arr-mom_m"></span></button>
        <button class="sbtn"    data-k="fip_m" onclick="setSort('fip_m',this)">Aylık FIP <span id="arr-fip_m"></span></button>
      </div>
    </div>
    <div class="ssec">
      <div class="slabel">Sektör</div>
      <div class="ind-list" id="ind-list"></div>
    </div>
  </aside>

  <main class="main">
    <div class="toolbar">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="view-tabs">
          <button class="vtab on" onclick="setView('tbl',this)">≡ TABLO</button>
          <button class="vtab"    onclick="setView('hm',this)">⊞ ISILI</button>
        </div>
        <span class="rcount" id="rcount">—</span>
      </div>
      <div style="display:flex;gap:7px">
        <button class="dl-btn" onclick="dlCSV()">↓ CSV</button>
        <button class="dl-btn" onclick="dlJSON()">↓ JSON</button>
      </div>
    </div>

    <div id="view-tbl" class="tbl-wrap">
      <table>
        <thead><tr>
          <th style="width:30px">#</th>
          <th>TİP</th>
          <th onclick="setSort('ticker')">TICKER</th>
          <th>ŞİRKET</th>
          <th>SEKTÖR</th>
          <th onclick="setSort('mom')" class="sorted" id="th-mom">12-1M MOM ↓</th>
          <th onclick="setSort('fip')" id="th-fip">YIL FIP</th>
          <th onclick="setSort('mom_m')" id="th-mom_m">AY MOM</th>
          <th onclick="setSort('fip_m')" id="th-fip_m">AY FIP</th>
          <th title="Negatif / Pozitif / Flat gün sayısı (cari ay)">NEG/POS/FLAT</th>
          <th>FIP GEÇMİŞİ</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div id="view-hm" class="hm-wrap" style="display:none">
      <div class="hm-grid" id="hm-grid"></div>
    </div>
  </main>
</div>

<!-- ── DETAY MODAL ─────────────────────────────────────────────────────────── -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-hdr">
      <div>
        <div class="modal-title" id="m-title">—</div>
        <div class="modal-sub"   id="m-sub">—</div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="loading">Yükleniyor...</div>
    </div>
  </div>
</div>

<!-- TOOLTIP -->
<div class="tt" id="tt">
  <div class="tt-title" id="tt-t"></div>
  <div id="tt-b"></div>
</div>

<script>
const STOCKS     = __STOCKS_JSON__;
const META       = __META_JSON__;
const DETAIL_URL = 'data/detail/';

const S = { type:'ALL', industry:null, q:'', sort:'mom', dir:-1, view:'tbl' };
let   currentModalTab = 'monthly';

// ── Helpers ───────────────────────────────────────────────────────────────────
const lastM  = (s,f) => { const m=[...s.monthly].reverse().find(x=>x[f]!=null); return m?m[f]:null; };
const pctFmt = v => v!=null?(v>=0?'+':'')+( (v*100).toFixed(1))+'%':'—';
const fipFmt = v => v!=null?(v>=0?'+':'')+v.toFixed(4):'—';
const momClr = v => v==null?'var(--text2)':v>0?'var(--green)':'var(--red)';
const fipClr = v => v==null?'var(--text2)':v<0?'var(--green)':'var(--red)';  // negatif=iyi=yeşil
const esc    = s => String(s).replace(/'/g,"\\'");

// ── Init ─────────────────────────────────────────────────────────────────────
function init(){
  document.getElementById('s-total').textContent=META.total;
  document.getElementById('s-viop').textContent =META.viop;
  document.getElementById('s-pmom').textContent =META.pos_mom;
  document.getElementById('s-nmom').textContent =META.neg_mom;
  document.getElementById('s-nfip').textContent =META.neg_fip;
  document.getElementById('s-pfip').textContent =META.pos_fip;
  document.getElementById('hdr-date').textContent='Son veri: '+META.last_updated;

  const inds=[...new Set(STOCKS.map(s=>s.industry).filter(Boolean))].sort();
  const list=document.getElementById('ind-list');
  const a0=Object.assign(document.createElement('button'),{className:'ibtn on',textContent:'— Tümü'});
  a0.onclick=()=>setInd(null,a0); list.appendChild(a0);
  inds.forEach(ind=>{
    const b=Object.assign(document.createElement('button'),{className:'ibtn',textContent:ind});
    b.onclick=()=>setInd(ind,b); list.appendChild(b);
  });

  document.getElementById('q').addEventListener('input',e=>{S.q=e.target.value.toLowerCase();render();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModalDirect();});
  render();
}

// ── Filter & Sort ─────────────────────────────────────────────────────────────
function filtered(){
  let d=STOCKS.slice();
  if(S.type!=='ALL') d=d.filter(s=>s.type===S.type);
  if(S.industry)     d=d.filter(s=>s.industry===S.industry);
  if(S.q)            d=d.filter(s=>s.ticker.toLowerCase().includes(S.q)||s.name.toLowerCase().includes(S.q));
  const N=-Infinity;
  d.sort((a,b)=>{
    let av,bv;
    switch(S.sort){
      case 'mom':   av=a.mom??N;bv=b.mom??N;break;
      case 'fip':   av=a.fip??N;bv=b.fip??N;break;
      case 'mom_m': av=lastM(a,'momentum')??N;bv=lastM(b,'momentum')??N;break;
      case 'fip_m': av=lastM(a,'fip')??N;bv=lastM(b,'fip')??N;break;
      case 'ticker':av=a.ticker;bv=b.ticker;break;
      default:      av=a.mom??N;bv=b.mom??N;
    }
    return av===bv?0:(av<bv?-1:1)*S.dir;
  });
  return d;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const data=filtered();
  document.getElementById('rcount').textContent=data.length+' hisse';
  S.view==='tbl'?renderTable(data):renderHM(data);
}

function renderTable(data){
  const mx=Math.max(...data.map(s=>Math.abs(s.mom||0)),0.001);
  const rows=data.map((s,i)=>{
    const lmm=lastM(s,'momentum'),lmf=lastM(s,'fip');
    const lm=s.monthly.length?s.monthly[s.monthly.length-1]:{};
    const bw=Math.abs((s.mom||0)/mx)*26,mc=momClr(s.mom),fc=fipClr(s.fip);
    const neg=lm.neg_count||0,pos=lm.pos_count||0,flat=lm.flat_count||0;
    const npfHtml=lm.total_days?
      `<div class="npf-cell">
         <span style="color:var(--red)">${neg}</span>
         <span style="color:var(--text3)">·</span>
         <span style="color:var(--green)">${pos}</span>
         <span style="color:var(--text3)">·</span>
         <span style="color:var(--text2)">${flat}</span>
       </div>`:'—';
    const spark=s.monthly.map(m=>{
      if(m.fip==null)return'';
      const h=Math.min(Math.abs(m.fip)*280,16);
      return `<div class="spark-b" style="height:${Math.max(h,2)}px;background:${fipClr(m.fip)};opacity:.75"></div>`;
    }).join('');
    const badge=s.type==='VIOP'?'<span class="badge bv">VIOP</span>':'<span class="badge bs">STK</span>';
    return `<tr class="${s.type==='VIOP'?'tr-viop':''}"
               onclick="openModal('${esc(s.ticker)}','${esc(s.name)}','${esc(s.type)}','${esc(s.industry)}')"
               onmouseenter="showTT(event,${i})" onmouseleave="hideTT()">
      <td class="rank-c">${i+1}</td>
      <td>${badge}</td>
      <td class="ticker-c">${s.ticker}</td>
      <td class="name-c" title="${s.name}">${s.name}</td>
      <td class="ind-c">${s.industry}</td>
      <td><div class="mom-wrap">
        <span style="color:${mc};min-width:54px;text-align:right">${pctFmt(s.mom)}</span>
        <div class="mom-bg"><div class="mom-bar" style="left:${s.mom>=0?'50%':(50-bw)+'%'};width:${bw}%;background:${mc}"></div></div>
      </div></td>
      <td style="color:${fc}">${fipFmt(s.fip)}</td>
      <td style="color:${momClr(lmm)}">${pctFmt(lmm)}</td>
      <td style="color:${fipClr(lmf)}">${fipFmt(lmf)}</td>
      <td>${npfHtml}</td>
      <td><div class="spark">${spark}</div></td>
    </tr>`;
  }).join('');
  document.getElementById('tbody').innerHTML=rows||
    '<tr><td colspan="11" style="text-align:center;padding:40px;color:var(--text3)">Sonuç yok</td></tr>';
}

function renderHM(data){
  const mx=Math.max(...data.map(s=>Math.abs(s.mom||0)),0.001);
  document.getElementById('hm-grid').innerHTML=data.map((s,i)=>{
    const v=s.mom||0,int=Math.min(Math.abs(v)/mx,1);
    const bg=v>0?`rgba(34,211,160,${0.1+int*.55})`:v<0?`rgba(244,63,94,${0.1+int*.55})`:'var(--bg3)';
    return `<div class="hm-cell" style="background:${bg}"
                 onclick="openModal('${esc(s.ticker)}','${esc(s.name)}','${esc(s.type)}','${esc(s.industry)}')"
                 onmouseenter="showTT(event,${i})" onmouseleave="hideTT()">
      ${s.type==='VIOP'?'<div class="hm-dot"></div>':''}
      <div class="hm-t">${s.ticker}</div>
      <div class="hm-v">${pctFmt(s.mom)}</div>
    </div>`;
  }).join('');
}

// ── DETAY MODAL ───────────────────────────────────────────────────────────────
let _modalStock=null,_modalDetail=null;

function openModal(ticker,name,type,industry){
  hideTT();
  _modalStock  = STOCKS.find(s=>s.ticker===ticker)||null;
  _modalDetail = null;
  currentModalTab='monthly';
  document.getElementById('m-title').textContent=`${ticker} — ${name}`;
  document.getElementById('m-sub').textContent  =`${type} · ${industry}`;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
  renderModalContent();

  // Arka planda günlük detayı yükle
  fetch(`${DETAIL_URL}${ticker}.json`)
    .then(r=>r.ok?r.json():null)
    .then(d=>{ if(d){_modalDetail=d; if(currentModalTab==='daily'||currentModalTab==='monthly') renderModalContent();} })
    .catch(()=>{});
}

function setModalTab(tab){
  currentModalTab=tab;
  renderModalContent();
}

function renderModalContent(){
  const s=_modalStock; if(!s) return;
  const d=_modalDetail;
  const lm=s.monthly.length?s.monthly[s.monthly.length-1]:{};

  // Tab bar
  const tabs=`<div class="mtabs">
    <button class="mtab ${currentModalTab==='monthly'?'on':''}" onclick="setModalTab('monthly')">AYLIK ÖZET</button>
    <button class="mtab ${currentModalTab==='daily'?'on':''}"   onclick="setModalTab('daily')">GÜNLÜK KAPANIŞ</button>
    <button class="mtab ${currentModalTab==='info'?'on':''}"    onclick="setModalTab('info')">VERİ KAYNAĞI</button>
  </div>`;

  // Özet kartlar (her tab'da sabit)
  const cards=`<div class="m-cards">
    <div class="m-card">
      <div class="m-card-val" style="color:${momClr(s.mom)}">${pctFmt(s.mom)}</div>
      <div class="m-card-lbl">12-1M Momentum</div>
    </div>
    <div class="m-card">
      <div class="m-card-val" style="color:${fipClr(s.fip)}">${fipFmt(s.fip)}</div>
      <div class="m-card-lbl">Yıllık FIP<br>${s.fip!=null&&s.fip<0?'✓ Kaliteli (smooth)':s.fip!=null&&s.fip>0?'⚠ Spiky':'—'}</div>
    </div>
    <div class="m-card">
      <div class="m-card-val" style="color:${momClr(lm.momentum)}">${pctFmt(lm.momentum)}</div>
      <div class="m-card-lbl">Aylık Mom<br>${lm.month||'—'}</div>
    </div>
    <div class="m-card">
      <div class="m-card-val" style="color:${fipClr(lm.fip)}">${fipFmt(lm.fip)}</div>
      <div class="m-card-lbl">Aylık FIP<br>${lm.month||'—'}</div>
    </div>
  </div>`;

  let tabContent='';

  if(currentModalTab==='monthly'){
    const months=(d?d.monthly:s.monthly).slice(-13);
    tabContent=`<div class="m-sec-title">Aylık Detay — Son 13 Ay (Negatif · Pozitif · Flat gün sayıları)</div>
    <div class="m-month-grid">${months.map(m=>{
      const neg=m.neg_count||0,pos=m.pos_count||0,flat=m.flat_count||0,tot=m.total_days||1;
      const nP=neg/tot*100,pP=pos/tot*100,fP=flat/tot*100;
      return `<div class="m-month-card">
        <div class="mmcard-lbl">${m.month}</div>
        <div class="mmcard-row"><span class="mmcard-key">Momentum</span><span class="mmcard-val" style="color:${momClr(m.momentum)}">${pctFmt(m.momentum)}</span></div>
        <div class="mmcard-row"><span class="mmcard-key">FIP</span><span class="mmcard-val" style="color:${fipClr(m.fip)}">${fipFmt(m.fip)}</span></div>
        <div class="mmcard-row"><span class="mmcard-key">Toplam gün</span><span class="mmcard-val" style="color:var(--text2)">${tot}</span></div>
        <div class="npf-bars">
          <div class="npf-col">
            <div class="npf-bg"><div class="npf-fill" style="height:${nP}%;background:var(--red);opacity:.8"></div></div>
            <div class="npf-num" style="color:var(--red)">${neg}</div>
            <div class="npf-lbl">NEG</div>
          </div>
          <div class="npf-col">
            <div class="npf-bg"><div class="npf-fill" style="height:${pP}%;background:var(--green);opacity:.8"></div></div>
            <div class="npf-num" style="color:var(--green)">${pos}</div>
            <div class="npf-lbl">POS</div>
          </div>
          <div class="npf-col">
            <div class="npf-bg"><div class="npf-fill" style="height:${fP}%;background:var(--text3)"></div></div>
            <div class="npf-num" style="color:var(--text3)">${flat}</div>
            <div class="npf-lbl">FLAT</div>
          </div>
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  else if(currentModalTab==='daily'){
    if(!d){
      tabContent=`<div class="loading">Günlük veri yükleniyor...</div>`;
    } else {
      // Ay seçici
      const months=d.monthly.filter(m=>m.days&&m.days.length>0);
      const selMonth=months.length?months[months.length-1]:null;
      const aySelect=months.map(m=>
        `<option value="${m.month}" ${m===selMonth?'selected':''}>${m.month} (${m.total_days} gün)</option>`
      ).join('');

      const renderDailyTable=(month)=>{
        const m=d.monthly.find(x=>x.month===month);
        if(!m||!m.days||!m.days.length) return '<div class="loading">Bu ay için günlük veri yok.</div>';
        const rows=m.days.map(day=>{
          const c=day.ret>0?'var(--green)':day.ret<0?'var(--red)':'var(--text2)';
          const icon=day.ret>0?'▲':day.ret<0?'▼':'—';
          return `<tr>
            <td>${day.date}</td>
            <td style="color:${c};text-align:right;font-weight:500">${(day.ret>=0?'+':'')+(day.ret*100).toFixed(4)}%</td>
            <td style="color:${c};text-align:center">${icon}</td>
          </tr>`;
        }).join('');
        return `<div class="m-daily-wrap">
          <table class="m-daily-table">
            <thead><tr><th>TARİH</th><th style="text-align:right">GÜNLÜK % DEĞİŞİM</th><th style="text-align:center">DURUM</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
      };

      window._renderDaily = renderDailyTable;
      tabContent=`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
          <span style="font-family:var(--mono);font-size:10px;color:var(--text2)">Ay seç:</span>
          <select id="day-sel" onchange="document.getElementById('day-tbl').innerHTML=window._renderDaily(this.value)"
            style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:4px;font-family:var(--mono);font-size:11px;outline:none">
            ${aySelect}
          </select>
        </div>
        <div id="day-tbl">${renderDailyTable(selMonth?selMonth.month:'')}</div>`;
    }
  }

  else if(currentModalTab==='info'){
    tabContent=`
      <div class="info-box">
        <strong style="color:var(--text);display:block;margin-bottom:8px">📁 Veri kaynağı ve güncelleme mantığı</strong>
        Her gün saat 18:30 Türkiye saatinde GitHub Actions otomatik olarak çalışır ve şu işlemleri yapar:<br><br>
        <strong style="color:var(--accent)">1. Yeni kapanış verisi çekme</strong><br>
        yfinance kütüphanesi ile Borsa İstanbul kapanış fiyatları alınır, günlük % değişim hesaplanır.<br>
        Veri, Excel dosyasına (<code>Claude_Momentum_Screener_BIST_Labyrinth.xlsx</code>) yazılır.<br><br>
        <strong style="color:var(--accent)">2. Excel güncelleme</strong><br>
        Her hisse için yeni gün sütununa ham % değişim kaydedilir. Güncelleme öncesinde otomatik backup alınır.<br><br>
        <strong style="color:var(--accent)">3. Hesaplamalar</strong><br>
        Python motoru (engine.py) Excel'den veriyi okur, 12-1M Momentum ve FIP değerlerini hesaplar.<br><br>
        <strong style="color:var(--accent)">4. Günlük veri kontrolü</strong><br>
        Tüm ham verileri CSV olarak indirmek için ana sayfadaki <code>↓ CSV</code> butonunu kullanın.<br>
        Bireysel hisse günlük verisi için bu saydaki <strong>GÜNLÜK KAPANIŞ</strong> tabına bakın.<br><br>
        <strong style="color:var(--accent)">5. GitHub'da veri takibi</strong><br>
        Her güncelleme bir commit olarak kaydedilir. GitHub reposunda <code>docs/data/</code> klasöründe<br>
        <code>stocks.json</code>, <code>meta.json</code> ve <code>momentum_today.csv</code> dosyalarını görebilirsiniz.
      </div>`;
  }

  document.getElementById('modal-body').innerHTML=tabs+cards+tabContent;
}

function closeModal(e){ if(e.target===document.getElementById('overlay')) closeModalDirect(); }
function closeModalDirect(){ document.getElementById('overlay').classList.remove('open'); document.body.style.overflow=''; }

// ── Controls ──────────────────────────────────────────────────────────────────
function setType(t,btn){
  S.type=t;
  document.querySelectorAll('[data-type]').forEach(b=>b.classList.remove('on','on-v'));
  btn.classList.add(t==='VIOP'?'on-v':'on');
  render();
}
function setSort(k,btn){
  if(S.sort===k) S.dir*=-1;
  else{S.sort=k;S.dir=(k==='fip'||k==='fip_m')?1:-1;}
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('on'));
  if(btn) btn.classList.add('on');
  ['mom','fip','mom_m','fip_m'].forEach(key=>{
    const el=document.getElementById('arr-'+key);
    if(el) el.textContent=S.sort===key?(S.dir===-1?'↓':'↑'):'';
  });
  render();
}
function setInd(ind,btn){
  S.industry=ind;
  document.querySelectorAll('.ibtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function setView(v,btn){
  S.view=v;
  document.querySelectorAll('.vtab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('view-tbl').style.display=v==='tbl'?'block':'none';
  document.getElementById('view-hm').style.display =v==='hm'?'block':'none';
  render();
}

// ── Download ──────────────────────────────────────────────────────────────────
function dlCSV(){
  const data=filtered();
  const rows=[['Ticker','Name','Type','Industry','12-1M_Mom_%','FIP_Annual','LastMonth','LastMonth_Mom_%','LastMonth_FIP','Neg_Days','Pos_Days','Flat_Days','Total_Days']];
  data.forEach(s=>{
    const lm=s.monthly.length?s.monthly[s.monthly.length-1]:{};
    rows.push([s.ticker,`"${s.name}"`,s.type,`"${s.industry}"`,
      s.mom!=null?(s.mom*100).toFixed(4):'',
      s.fip!=null?s.fip.toFixed(6):'',
      lm.month||'',
      lm.momentum!=null?(lm.momentum*100).toFixed(4):'',
      lm.fip!=null?lm.fip.toFixed(6):'',
      lm.neg_count??'',lm.pos_count??'',lm.flat_count??'',lm.total_days??'']);
  });
  _dl('\ufeff'+rows.map(r=>r.join(',')).join('\n'),`labyrinth_${META.last_updated}.csv`,'text/csv');
}
function dlJSON(){
  _dl(JSON.stringify({meta:META,stocks:filtered()},null,2),`labyrinth_${META.last_updated}.json`,'application/json');
}
function _dl(c,n,m){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:m}));a.download=n;a.click();}

// ── Tooltip ───────────────────────────────────────────────────────────────────
const _ttCache={};
function showTT(e,i){
  const data=filtered();
  if(!data[i]) return;
  const s=data[i],lmm=lastM(s,'momentum'),lmf=lastM(s,'fip');
  document.getElementById('tt-t').textContent=`${s.ticker} — ${s.name}`;
  document.getElementById('tt-b').innerHTML=[
    ['12-1M Mom',`<span style="color:${momClr(s.mom)}">${pctFmt(s.mom)}</span>`],
    ['Yıllık FIP',`<span style="color:${fipClr(s.fip)}">${fipFmt(s.fip)}</span>`],
    ['Aylık Mom', `<span style="color:${momClr(lmm)}">${pctFmt(lmm)}</span>`],
    ['Aylık FIP', `<span style="color:${fipClr(lmf)}">${fipFmt(lmf)}</span>`],
    ['Sektör',s.industry||'—'],['Tip',s.type],
  ].map(([k,v])=>`<div class="tt-row"><span class="tt-k">${k}</span><span>${v}</span></div>`).join('');
  const tt=document.getElementById('tt');
  tt.style.left=Math.min(e.clientX+14,window.innerWidth-235)+'px';
  tt.style.top =Math.min(e.clientY-8, window.innerHeight-200)+'px';
  tt.classList.add('show');
}
function hideTT(){ document.getElementById('tt').classList.remove('show'); }

init();
</script>
